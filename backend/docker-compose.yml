version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: outdoorloop-db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=outdoorloop  # Creates the database automatically

  backend:
    build: .
    container_name: outdoorloop-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file: .env

volumes:
  pgdata:

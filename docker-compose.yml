version: '3.8'
services:
  postgres:
    image: postgres:17.4
    container_name: outdoorloop-db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=outdoorloop  # Creates the database automatically

  backend:
    build:
      context: ./backend
    container_name: outdoorloop-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file: .env

  frontend:
    build:
      context: ./frontend
    container_name: outdoorloop-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

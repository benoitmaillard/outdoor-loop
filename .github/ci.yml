name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3
        
      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
        
      # Install dependencies and run tests
      - name: Install dependencies and run frontend tests
        run: |
          cd frontend
          npm install
          npm run test -- --watch=false --browsers=ChromeHeadless

  backend:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3
        
      # Set up Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adoptopenjdk'
        
      # Install dependencies and run tests
      - name: Install dependencies and run backend tests
        run: |
          cd backend
          ./mvnw clean install
          ./mvnw test  # Run tests using Maven (or use Gradle if you prefer)
          
  # Optional: You can add a build job that builds both the frontend and backend if you want
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build --prod

      # Build backend
      - name: Build backend
        run: |
          cd backend
          ./mvnw clean install
